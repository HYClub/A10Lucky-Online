name: Daily Archive
on:
  schedule:
    - cron: '30 7 * * 1-5'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Archive daily snapshot
        run: python scripts/archive_daily.py
      - name: Commit archive
        run: |
          git config user.name "A10Lucky Bot"
          git config user.email "bot@a10lucky.dev"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add docs/data/archive/
          git diff --cached --quiet || git commit -m "auto: daily archive $(date +'%Y-%m-%d')"
          git push

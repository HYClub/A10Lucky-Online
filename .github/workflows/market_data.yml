name: Market Data
on:
  schedule:
    - cron: '*/5 1,2,3,4,5,6 * * 1-5'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Fetch market data
        run: python scripts/fetch_market.py
      - name: Compute strategies
        run: node scripts/run_strategies.mjs
      - name: Generate archive & verify previous day
        run: node scripts/daily_summary.mjs
      - name: Commit updates
        run: |
          git config user.name "A10Lucky Bot"
          git config user.email "bot@a10lucky.dev"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add docs/data/market/ docs/data/strategies/latest.json docs/data/archive/
          git diff --cached --quiet || git commit -m "auto: market data + strategies $(date +'%Y-%m-%d %H:%M')"
          git push
